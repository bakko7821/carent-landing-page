<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carent</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section id="hero">
        <div class="bg-black"></div>
        <header>
          <a href="#"><h1 class="h3">Carent</h1></a>
          <div class="left-box">
            <nav>
              <ul>
                <li><a class="body-sm" href="#home">Home</a></li>
                <li><a class="body-sm" href="#about">About</a></li>
                <li><a class="body-sm" href="#booking">Booking</a></li>
                <li><a class="body-sm" href="#cars">Cars</a></li>
                <li><a class="body-sm" href="#contacts">Contacts</a></li>
              </ul>
            </nav>
            <div class="auth-box">
              <button class="body-sm">Login</button>
              <div class="vertical-plug"></div>
              <button class="body-sm">Sign Up</button>
            </div>
          </div>
        </header>
        <div class=""></div>
      </section>
      <footer>
        <section id="contacts">
          <h2 class="section-title h2">Contact Us</h2>
          <div class="">
            <form action="submit">
              <div class="floating-input">
                <input
                  type="text"
                  name="name"
                  id="name"
                  placeholder="Your Name*"
                />
                <label for="name">Your Name*</label>
              </div>
              <div class="floating-input">
                <input
                  type="text"
                  name="email"
                  id="email"
                  placeholder="Your Email*"
                />
                <label for="email">Your Email*</label>
              </div>
              <div class="floating-input">
                <textarea
                  type="text"
                  name="message"
                  id="message"
                  placeholder="Your Message*"
                ></textarea>
                <label for="message">Your Message*</label>
              </div>
              <button type="submit">Send A Message</button>
            </form>
            <img src="images/6 1.png" alt="" />
          </div>
          <p>
            Need help renting a car? Please call <span>+1-333-444-5555</span>
          </p>
          <div class="horizontal-plug"></div>
          <div class="">
            <a href="#"><p class="h3">Carent</p></a>
            <ul class="social-box">
              <li>
                <a href=""><img src="" alt="" /></a>
              </li>
              <li>
                <a href=""><img src="" alt="" /></a>
              </li>
              <li>
                <a href=""><img src="" alt="" /></a>
              </li>
              <li>
                <a href=""><img src="" alt="" /></a>
              </li>
              <li>
                <a href=""><img src="" alt="" /></a>
              </li>
            </ul>
          </div>
          <div class="bg-black"></div>
        </section>
      </footer>
    </main>
  </body>
</html>
